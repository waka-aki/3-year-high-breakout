name: Daily 3-Year High Breakout Scan

on:
  schedule:
    # 毎営業日 JST 18:17 (UTC 09:17) に1日1回だけ実行する。
    # GitHub の schedule はベストエフォートで遅延・スキップが起こりうるが、
    # 引け(15:00)後かつ JST 0時まで十分な余裕がある時間帯なので、多少遅延しても
    # 当日の終値で当日中に実行される。毎時0分は混雑するため17分に設定。
    - cron: "17 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore price cache
        uses: actions/cache/restore@v4
        with:
          path: data/price_cache.csv
          key: price-cache-${{ github.run_id }}
          restore-keys: |
            price-cache-

      - name: Run breakout scanner
        run: |
          # tickers.csv 再取得タイミング:
          # (1) ファイル不在(初回) または
          # (2) 月初の最初の平日 (JPXが月次で更新するファイルに合わせて月1回)
          DAY=$(TZ=Asia/Tokyo date +%d)
          FIRST_DOW=$(TZ=Asia/Tokyo date -d "$(TZ=Asia/Tokyo date +%Y-%m-01)" +%u)
          case "$FIRST_DOW" in
            6) FIRST_WEEKDAY="03" ;;  # 1日が土 → 最初の平日は3日(月)
            7) FIRST_WEEKDAY="02" ;;  # 1日が日 → 最初の平日は2日(月)
            *) FIRST_WEEKDAY="01" ;;  # 1日が平日 → 1日が最初の平日
          esac
          if [ ! -f data/tickers.csv ] || [ "$DAY" = "$FIRST_WEEKDAY" ]; then
            echo "Refreshing tickers.csv from JPX (today=$DAY, first weekday=$FIRST_WEEKDAY)"
            python src/main.py --update-tickers
          else
            python src/main.py
          fi
        continue-on-error: true

      - name: Save price cache
        uses: actions/cache/save@v4
        with:
          path: data/price_cache.csv
          key: price-cache-${{ github.run_id }}

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tickers.csv data/breakout_history.csv data/performance_tracking.csv output/dashboard.html logs/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            DATE=$(TZ=Asia/Tokyo date +%Y-%m-%d)
            git commit -m "🔄 Daily scan: ${DATE}"
            git push
          fi
