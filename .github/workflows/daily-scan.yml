name: Daily 3-Year High Breakout Scan

on:
  schedule:
    # 毎日 JST 18:00 (UTC 09:00) に実行
    # 東証取引終了(15:30)後、データ反映の余裕を持たせている
    - cron: "0 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore price cache
        uses: actions/cache/restore@v4
        with:
          path: data/price_cache.csv
          key: price-cache

      - name: Run breakout scanner
        run: |
          if [ ! -f data/tickers.csv ]; then
            python src/main.py --update-tickers
          else
            python src/main.py
          fi
        continue-on-error: true

      - name: Save price cache
        uses: actions/cache/save@v4
        with:
          path: data/price_cache.csv
          key: price-cache

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tickers.csv data/breakout_history.csv data/performance_tracking.csv output/dashboard.html logs/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            DATE=$(TZ=Asia/Tokyo date +%Y-%m-%d)
            git commit -m "🔄 Daily scan: ${DATE}"
            git push
          fi
